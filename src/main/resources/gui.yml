auction-browser:
  title: "&8ProAuction &7- &fBrowse"
  size: 54

  item-slots: [10,11,12,13,14,15,16, 19,20,21,22,23,24,25, 28,29,30,31,32,33,34]

  filler:
    enabled: true
    material: "BLACK_STAINED_GLASS_PANE"
    name: " "

  buttons:
    prev:
      slot: 45
      material: "ARROW"
      name: "&cPrevious"
      lore:
        - "&7Go to previous page"

    close:
      slot: 49
      material: "BARRIER"
      name: "&cClose"
      lore:
        - "&7Close this menu"

    next:
      slot: 53
      material: "ARROW"
      name: "&aNext"
      lore:
        - "&7Go to next page"

listing-lore:
  - "&7Seller: &f%seller%"
  - "&7Price: &f%price% %symbol% &7(%currency%)"
  - "&7Time Left: &f%time_left%"
  - ""
  - "&aClick to buy"

confirm-purchase:
  title: "&8Confirm Purchase"
  size: 27

  info-slot: 13

  buttons:
    confirm:
      slot: 11
      material: "LIME_CONCRETE"
      name: "&aConfirm"
      lore:
        - "&7Buy this item"

    cancel:
      slot: 15
      material: "RED_CONCRETE"
      name: "&cCancel"
      lore:
        - "&7Go back"
